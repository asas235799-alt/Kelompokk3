/* ==========================================================
   [3] KD-TREE ENGINE
========================================================== */

class KDNode{

constructor(point, axis){

this.point = point;
this.axis = axis;

this.left = null;
this.right = null;

}

}

class KDTree{

constructor(points=[]){

this.root = this.buildTree(points,0);

}

/* ==========================
   BUILD TREE
========================== */

buildTree(points, depth){

if(!points.length){
return null;
}

const axis = depth % 2;

const sorted = [...points].sort((a,b)=>{

return axis === 0
? a.lat - b.lat
: a.lng - b.lng;

});

const median = Math.floor(sorted.length/2);

const node = new KDNode(
sorted[median],
axis
);

node.left = this.buildTree(
sorted.slice(0,median),
depth+1
);

node.right = this.buildTree(
sorted.slice(median+1),
depth+1
);

return node;

}

/* ==========================
   INSERT
========================== */

insert(point){

const insertNode = (node, point, depth)=>{

if(!node){

return new KDNode(
point,
depth % 2
);

}

const axis = node.axis;

const valueNode =
axis===0
? node.point.lat
: node.point.lng;

const valuePoint =
axis===0
? point.lat
: point.lng;

if(valuePoint < valueNode){

node.left =
insertNode(
node.left,
point,
depth+1
);

}else{

node.right =
insertNode(
node.right,
point,
depth+1
);

}

return node;

};

this.root =
insertNode(
this.root,
point,
0
);

}

/* ==========================
   RANGE SEARCH
========================== */

rangeSearch(center,radiusKm){

    const results = [];

    const search = (node)=>{

        if(!node) return;

        const distance = haversine(

            center.lat,
            center.lng,

            node.point.lat,
            node.point.lng

        );

        if(distance <= radiusKm){

            results.push({

                ...node.point,
                distance

            });

        }

        const axis = node.axis;

        const centerValue =
            axis===0
            ? center.lat
            : center.lng;

        const nodeValue =
            axis===0
            ? node.point.lat
            : node.point.lng;

        const radiusDegree =
            radiusKm / 111;

        if(centerValue-radiusDegree <= nodeValue){

            search(node.left);

        }

        if(centerValue+radiusDegree >= nodeValue){

            search(node.right);

        }

    };

    search(this.root);

    results.sort(
        (a,b)=>a.distance-b.distance
    );

    return results;
}
}

/* ==========================
   HAVERSINE FORMULA
   Semua jarak dalam KM
========================== */

function haversine(
    lat1,
    lng1,
    lat2,
    lng2
){

    const R = 6371;

    const dLat =
        (lat2-lat1) *
        Math.PI / 180;

    const dLng =
        (lng2-lng1) *
        Math.PI / 180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180)
        *
        Math.cos(lat2*Math.PI/180)

        *

        Math.sin(dLng/2)
        *
        Math.sin(dLng/2);

    const c =
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R * c;
}

/* ==========================
   GENERATOR LINGKARAN GEOJSON
========================== */

function createCircleGeoJSON(
    centerLng,
    centerLat,
    radiusKm,
    points=64
){

    const coordinates = [];

    const earthRadius = 6371;

    const distance =
        radiusKm /
        earthRadius;

    const lat =
        centerLat *
        Math.PI / 180;

    const lng =
        centerLng *
        Math.PI / 180;

    for(let i=0;i<=points;i++){

        const bearing =
            (i * 360 / points)
            *
            Math.PI/180;

        const lat2 =
            Math.asin(
                Math.sin(lat)
                *
                Math.cos(distance)

                +

                Math.cos(lat)
                *
                Math.sin(distance)
                *
                Math.cos(bearing)
            );

        const lng2 =
            lng +
            Math.atan2(
                Math.sin(bearing)
                *
                Math.sin(distance)
                *
                Math.cos(lat),

                Math.cos(distance)
                -
                Math.sin(lat)
                *
                Math.sin(lat2)
            );

        coordinates.push([

            lng2 * 180/Math.PI,
            lat2 * 180/Math.PI

        ]);

    }

    return {

        type:"Feature",

        geometry:{

            type:"Polygon",

            coordinates:[
                coordinates
            ]

        }

    };

}

/* ==========================
   ANIMASI NILAI
========================== */

function animateNumber(
    start,
    end,
    duration,
    callback
){

    const startTime =
        performance.now();

    function frame(now){

        const progress =
            Math.min(
                (now-startTime)/duration,
                1
            );

        const value =
            start +
            (
                (end-start)
                *
                progress
            );

        callback(value);

        if(progress < 1){

            requestAnimationFrame(
                frame
            );

        }

    }

    requestAnimationFrame(
        frame
    );

}

            position=>{

                resolve({

function decodePolyline(encoded){

    let points = [];
    let index = 0;
    let lat = 0;
    let lng = 0;

    while(index < encoded.length){

        let b;
        let shift = 0;
        let result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }while(b >= 0x20);

        const dlat =
            result & 1
            ? ~(result >> 1)
            : result >> 1;

        lat += dlat;

        shift = 0;
        result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }while(b >= 0x20);

        const dlng =
            result & 1
            ? ~(result >> 1)
            : result >> 1;

        lng += dlng;

        points.push([
            lng / 100000,
            lat / 100000
        ]);

    }

    return points;

}

        }
    );

    map.addLayer({

        id:"route-line",

        type:"line",

        source:"route-source",

        paint:{

            "line-color":"#00FFD1",

            "line-width":4,

            "line-opacity":1

        }

    });

    const total =
        coordinates.length;

    const start =
        performance.now();

    function frame(now){

        const progress =
            Math.min(
                (now-start)/1500,
                1
            );

        const count =
            Math.floor(
                progress * total
            );

        animated.length = 0;

        for(
            let i=0;
            i<count;
            i++
        ){

            animated.push(
                coordinates[i]
            );

        }

const source =
    map.getSource(
        "route-source"
    );

if(!source){
    return;
}

source.setData({

    type:"Feature",

    geometry:{

        type:"LineString",

        coordinates:animated

    }

});

        if(progress < 1){

            requestAnimationFrame(
                frame
            );

        }

        else{

            showRouteInfo(
                routeData
            );

        }

    }

    requestAnimationFrame(
        frame
    );

}

function showRouteInfo(route){

    const distanceKm =
        route.summary.distance
        /1000;

    const durationMin =
        route.summary.duration
        /60;

    const panel =
        document.getElementById(
            "routeInfo"
        );

    panel.innerHTML = `

        <div>

            <b>Jarak:</b>
            ${distanceKm.toFixed(1)} km

        </div>

        <div
        style="margin-top:6px">

            <b>Estimasi:</b>
            ${durationMin.toFixed(0)} menit

        </div>

        <button
        onclick="clearRoute()"
        style="
        margin-top:10px;
        width:100%;
        border:none;
        border-radius:8px;
        padding:8px;
        cursor:pointer;
        background:#ff4b4b;
        color:white;
        ">

            Hapus Rute

        </button>

    `;

    panel.classList.add(
        "show"
    );

}

/* ==========================

========================== */

function startClock(){

    function tick(){

        const now =
            new Date();

        const hh =
            String(
                now.getHours()
            )
            .padStart(2,"0");

        const mm =
            String(
                now.getMinutes()
            )
            .padStart(2,"0");

        const ss =
            String(
                now.getSeconds()
            )
            .padStart(2,"0");

        document
        .getElementById(
            "clock"
        )
        .textContent =

            `${hh}:${mm}:${ss}`;

    }

    tick();

    setInterval(
        tick,
        1000
    );

}

/* ==========================

========================== */

function playLoadingAnimation(){

    const text =
        "MENGINISIALISASI SISTEM SPASIAL...";

    const target =
        document.getElementById(
            "loadingText"
        );

    let index = 0;

    const timer =
        setInterval(()=>{

            target.textContent +=
                text[index];

            index++;

            if(
                index >= text.length
            ){

                clearInterval(
                    timer
                );

            }

        },50);

    setTimeout(()=>{

        document
        .getElementById(
            "loadingScreen"
        )
        .classList.add(
            "hide"
        );

    },2000);

}

/* ==========================

========================== */

function enableMarkerEffects(){

    wisataMarkers.forEach(item=>{

        item.element.addEventListener(
            "mouseenter",
            ()=>{

                item.element.style.zIndex =
                    999;

            }
        );

        item.element.addEventListener(
            "mouseleave",
            ()=>{

                item.element.style.zIndex =
                    1;

            }
        );

    });

}
