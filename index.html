/* ==========================================================
   [3] KD-TREE ENGINE
========================================================== */

class KDNode{

constructor(point, axis){

this.point = point;
this.axis = axis;

this.left = null;
this.right = null;

}

}

class KDTree{

constructor(points=[]){

this.root = this.buildTree(points,0);

}

/* ==========================
   BUILD TREE
========================== */

buildTree(points, depth){

if(!points.length){
return null;
}

const axis = depth % 2;

const sorted = [...points].sort((a,b)=>{

return axis === 0
? a.lat - b.lat
: a.lng - b.lng;

});

const median = Math.floor(sorted.length/2);

const node = new KDNode(
sorted[median],
axis
);

node.left = this.buildTree(
sorted.slice(0,median),
depth+1
);

node.right = this.buildTree(
sorted.slice(median+1),
depth+1
);

return node;

}

/* ==========================
   INSERT
========================== */

insert(point){

const insertNode = (node, point, depth)=>{

if(!node){

return new KDNode(
point,
depth % 2
);

}

const axis = node.axis;

const valueNode =
axis===0
? node.point.lat
: node.point.lng;

const valuePoint =
axis===0
? point.lat
: point.lng;

if(valuePoint < valueNode){

node.left =
insertNode(
node.left,
point,
depth+1
);

}else{

node.right =
insertNode(
node.right,
point,
depth+1
);

}

return node;

};

this.root =
insertNode(
this.root,
point,
0
);

}

/* ==========================
   KNN SEARCH
========================== */

nearestNeighbor(query,k=5){

    const best = [];

    const search = (node)=>{

        if(!node) return;

        const axis = node.axis;

        const distance = haversine(
            query.lat,
            query.lng,
            node.point.lat,
            node.point.lng
        );

        best.push({
            ...node.point,
            distance
        });

        best.sort(
            (a,b)=>a.distance-b.distance
        );

        if(best.length > k){
            best.pop();
        }

        const queryValue =
            axis===0
            ? query.lat
            : query.lng;

        const nodeValue =
            axis===0
            ? node.point.lat
            : node.point.lng;

        const nearBranch =
            queryValue < nodeValue
            ? node.left
            : node.right;

        const farBranch =
            queryValue < nodeValue
            ? node.right
            : node.left;

        search(nearBranch);

        const axisDistance =
            Math.abs(queryValue-nodeValue)
            *111;

        const worstDistance =
            best.length < k
            ? Infinity
            : best[best.length-1].distance;

        if(axisDistance < worstDistance){

            search(farBranch);

        }

    };

    search(this.root);

    return best;

}

/* ==========================
   RANGE SEARCH
========================== */

rangeSearch(center,radiusKm){

    const results = [];

    const search = (node)=>{

        if(!node) return;

        const distance = haversine(

            center.lat,
            center.lng,

            node.point.lat,
            node.point.lng

        );

        if(distance <= radiusKm){

            results.push({

                ...node.point,
                distance

            });

        }

        const axis = node.axis;

        const centerValue =
            axis===0
            ? center.lat
            : center.lng;

        const nodeValue =
            axis===0
            ? node.point.lat
            : node.point.lng;

        const radiusDegree =
            radiusKm / 111;

        if(centerValue-radiusDegree <= nodeValue){

            search(node.left);

        }

        if(centerValue+radiusDegree >= nodeValue){

            search(node.right);

        }

    };

    search(this.root);

    results.sort(
        (a,b)=>a.distance-b.distance
    );

    return results;
}
}

/* ==========================================================

/* ==========================
   HAVERSINE FORMULA
   Semua jarak dalam KM
========================== */

function haversine(
    lat1,
    lng1,
    lat2,
    lng2
){

    const R = 6371;

    const dLat =
        (lat2-lat1) *
        Math.PI / 180;

    const dLng =
        (lng2-lng1) *
        Math.PI / 180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180)
        *
        Math.cos(lat2*Math.PI/180)

        *

        Math.sin(dLng/2)
        *
        Math.sin(dLng/2);

    const c =
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R * c;
}

){

            setTimeout(

                delay

}

/* ==========================
   GENERATOR LINGKARAN GEOJSON
========================== */

function createCircleGeoJSON(
    centerLng,
    centerLat,
    radiusKm,
    points=64
){

    const coordinates = [];

    const earthRadius = 6371;

    const distance =
        radiusKm /
        earthRadius;

    const lat =
        centerLat *
        Math.PI / 180;

    const lng =
        centerLng *
        Math.PI / 180;

    for(let i=0;i<=points;i++){

        const bearing =
            (i * 360 / points)
            *
            Math.PI/180;

        const lat2 =
            Math.asin(
                Math.sin(lat)
                *
                Math.cos(distance)

                +

                Math.cos(lat)
                *
                Math.sin(distance)
                *
                Math.cos(bearing)
            );

        const lng2 =
            lng +
            Math.atan2(
                Math.sin(bearing)
                *
                Math.sin(distance)
                *
                Math.cos(lat),

                Math.cos(distance)
                -
                Math.sin(lat)
                *
                Math.sin(lat2)
            );

        coordinates.push([

            lng2 * 180/Math.PI,
            lat2 * 180/Math.PI

        ]);

    }

    return {

        type:"Feature",

        geometry:{

            type:"Polygon",

            coordinates:[
                coordinates
            ]

        }

    };

}

/* ==========================
   ANIMASI NILAI
========================== */

function animateNumber(
    start,
    end,
    duration,
    callback
){

    const startTime =
        performance.now();

    function frame(now){

        const progress =
            Math.min(
                (now-startTime)/duration,
                1
            );

        const value =
            start +
            (
                (end-start)
                *
                progress
            );

        callback(value);

        if(progress < 1){

            requestAnimationFrame(
                frame
            );

        }

    }

    requestAnimationFrame(
        frame
    );

}

async function getUserLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:-1.6101,
                lng:103.6131
            });

            return;
        }

        navigator.geolocation.getCurrentPosition(

            position=>{

                resolve({

                    lat:position.coords.latitude,
                    lng:position.coords.longitude

                });

            },

            ()=>{

                resolve({

                    lat:-1.6101,
                    lng:103.6131

                });

            },

            {

                enableHighAccuracy:true,
                timeout:10000,
                maximumAge:0

            }

        );

    });

}

========================== */

function findNearest(k=5){

    if(!kdTree) return [];

    const nearest =
        kdTree.nearestNeighbor({

            lat:userLocation.lat,
            lng:userLocation.lng

        },k)

        .filter(item=>
            isCategoryVisible(
                item.kategori
            )
        );

    highlightNearestResults(
        nearest
    );

    renderKNNResults(
        nearest
    );

    return nearest;

}

/* ==========================
   CARI DALAM RADIUS
========================== */

function findInRadius(radiusKm){

    if(!kdTree) return [];

    const results =
        kdTree.rangeSearch({

            lat:userLocation.lat,
            lng:userLocation.lng

        },radiusKm)

        .filter(item=>
            isCategoryVisible(
                item.kategori
            )
        );

    updateCounterText(
        results.length,
        radiusKm
    );

    updateRadiusMarkerState(
        results
    );

    return results;

}

    wisataMarkers.forEach(item=>{

                item.data.id

        }

    });

}

/* ==========================
   ROUTE ORS
========================== */

async function showRoute(id){

    const destination =
        WISATA_DATA.find(
            x=>x.id===id
        );

    if(!destination) return;

    clearRoute();

    try{

        const response =
            await fetch(

                "https://api.openrouteservice.org/v2/directions/driving-car",

                {

                    method:"POST",

                    headers:{

                        "Authorization":
                        CONFIG.ORS_API_KEY,

                        "Content-Type":
                        "application/json"

                    },

                    body:JSON.stringify({

                        coordinates:[

                            [
                                userLocation.lng,
                                userLocation.lat
                            ],

                            [
                                destination.lng,
                                destination.lat
                            ]

                        ]

                    })

                }

            );

        const data =
            await response.json();

        const coords =
            data.routes[0]
            .geometry.coordinates;

        animateRoute(
            coords,
            data.routes[0]
        );

    }

    catch(error){

        console.error(
            error
        );

        alert(
            "Gagal mengambil rute ORS"
        );

    }

}

/* ==========================
   ANIMASI POLYLINE
========================== */

function animateRoute(
    coordinates,
    routeData
){

    const animated = [];

    map.addSource(
        "route-source",
        {

            type:"geojson",

            data:{

                type:"Feature",

                geometry:{

                    type:"LineString",

                    coordinates:[]

                }

            }

        }
    );

    map.addLayer({

        id:"route-line",

        type:"line",

        source:"route-source",

        paint:{

            "line-color":"#00FFD1",

            "line-width":4,

            "line-opacity":1

        }

    });

    const total =
        coordinates.length;

    const start =
        performance.now();

    function frame(now){

        const progress =
            Math.min(
                (now-start)/1500,
                1
            );

        const count =
            Math.floor(
                progress * total
            );

        animated.length = 0;

        for(
            let i=0;
            i<count;
            i++
        ){

            animated.push(
                coordinates[i]
            );

        }

        map.getSource(
            "route-source"
        ).setData({

            type:"Feature",

            geometry:{

                type:"LineString",

                coordinates:animated

            }

        });

        if(progress < 1){

            requestAnimationFrame(
                frame
            );

        }

        else{

            showRouteInfo(
                routeData
            );

        }

    }

    requestAnimationFrame(
        frame
    );

}

   [9] ANIMASI & MICROINTERACTION
========================================================== */

/* ==========================
   TYPEWRITER
========================== */

function playLoadingAnimation(){

    const text =
        "MENGINISIALISASI SISTEM SPASIAL...";

    const target =
        document.getElementById(
            "loadingText"
        );

    let index = 0;

    const timer =
        setInterval(()=>{

            target.textContent +=
                text[index];

            index++;

            if(
                index >= text.length
            ){

                clearInterval(
                    timer
                );

            }

        },50);

    setTimeout(()=>{

        document
        .getElementById(
            "loadingScreen"
        )
        .classList.add(
            "hide"
        );

    },2000);

}

/* ==========================
   EFEK HOVER MARKER
========================== */

function enableMarkerEffects(){

    wisataMarkers.forEach(item=>{

        item.element.addEventListener(
            "mouseenter",
            ()=>{

                item.element.style.zIndex =
                    999;

            }
        );

        item.element.addEventListener(
            "mouseleave",
            ()=>{

                item.element.style.zIndex =
                    1;

            }
        );

    });

}

/* ==========================================================
   [10] INIT
========================================================== */

async function initializeSystem(){

    /* ======================
       LOADING
    ====================== */

    playLoadingAnimation();

    /* ======================
       MAP
    ====================== */

    initializeMap();

    /* ======================
       USER LOCATION
    ====================== */

    userLocation =
        await getUserLocation();

    updateCoordinatePanel();

    /* ======================
       TUNGGU MAP LOAD
    ====================== */

    map.on(
        "load",
        ()=>{

            /* ==================
               USER MARKER
            ================== */

            createUserMarker();

            /* ==================
               KDTREE
            ================== */

            kdTree =
                new KDTree(
                    WISATA_DATA
                );

            /* ==================
               MARKER
            ================== */

            loadWisataMarkers();

            /* ==================
               ANIMASI
            ================== */

            enableMarkerEffects();

            animatePanels();

            /* ==================
               FLY USER
            ================== */

            map.flyTo({

                center:[
                    userLocation.lng,
                    userLocation.lat
                ],

                zoom:13,

                speed:1.2,

                curve:1.4

            });

            /* ==================
               RADIUS AWAL
            ================== */

            const defaultRadius =
                Number(
                    document
                    .getElementById(
                        "radiusSlider"
                    )
                    .value
                );

            updateRadiusCircle(
                defaultRadius
            );

            findInRadius(
                defaultRadius
            );

        }
    );

    /* ======================
       UI
    ====================== */

    setupEventListeners();

    startClock();

}

/* ==========================
   START APP
========================== */

document.addEventListener(

    "DOMContentLoaded",

    ()=>{

        initializeSystem();

    }

);

</script>
